{% extends "base.html" %}

{% block content %}
<header class="mb-10">
  <h1 class="font-heading text-4xl font-bold text-clay-tan uppercase tracking-widest">
    {{ section.title }}
  </h1>
  <span class="accent-line"></span>
</header>

<div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
  {% for page in section.pages %}
    <article class="card-industrial flex flex-col p-5">
      <h2 class="font-heading text-lg font-semibold text-clay-tan uppercase tracking-wide leading-snug mb-3">
        {{ page.title }}
      </h2>
      <p class="text-sm text-clay-tan/70 leading-relaxed mb-5 flex-1">
        {{ page.summary | safe }}
      </p>
      <a href="{{ page.permalink | safe }}" class="btn-neon self-start">
        Leia mais
      </a>
    </article>
  {% endfor %}
</div>
{% endblock content %}
