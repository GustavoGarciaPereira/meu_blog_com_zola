<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyBlog</title>
    <link rel="icon" type="image/x-icon" href="https:&#x2F;&#x2F;gustavogarciapereira.github.io&#x2F;meu_blog_com_zola&#x2F;favicon.ico">

    <!-- Google Fonts: Oswald (headers) · Montserrat (body) · Fira Code (mono/console) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Oswald:wght@400;500;600;700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS compilado -->
    <link rel="stylesheet" href="https:&#x2F;&#x2F;gustavogarciapereira.github.io&#x2F;meu_blog_com_zola&#x2F;css/style.css">

    <!-- BASE_URL global para search.js (| safe impede escaping de '/' → '&#x2F;') -->
    <script>var BASE_URL = "https://gustavogarciapereira.github.io/meu_blog_com_zola/";</script>

    <!-- Web Push -->
    <script charset="UTF-8" src="//web.webpushs.com/js/push/939e2182ad02279e75eae0ea7b3794fb_1.js" async></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0NC0GBBD5W"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0NC0GBBD5W');
    </script>
  </head>
  <body class="bg-site bg-deep-shadow text-clay-tan font-body min-h-screen">

    <!-- ══════════════════════════════════════════════════════
         NAVBAR
         ══════════════════════════════════════════════════════ -->
    <header class="sticky top-0 z-40 border-b border-rust-copper/20 bg-deep-shadow/90 backdrop-blur-sm">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">

        <a href="https:&#x2F;&#x2F;gustavogarciapereira.github.io&#x2F;meu_blog_com_zola&#x2F;"
           class="font-code text-xs tracking-widest text-aqua-neon/70 transition-colors hover:text-aqua-neon">
          // SISTEMA_ONLINE
        </a>

        <button onclick="window.openSearchModal && window.openSearchModal()"
                aria-label="Abrir busca (⌘K)"
                class="flex items-center gap-2 rounded-sm border border-rust-copper/50 px-3 py-1.5
                       font-code text-xs text-rust-copper transition-all duration-200
                       hover:border-aqua-neon/60 hover:text-aqua-neon">
          <span>// BUSCAR...</span>
          <kbd class="rounded-sm bg-rust-copper/10 px-1 py-0.5 font-code text-[10px] leading-none">⌘K</kbd>
        </button>

      </div>
    </header>
    <!-- ══ FIM NAVBAR ══ -->

    <!-- ══════════════════════════════════════════════════════
         MODAL DE BUSCA — Command Palette (Cmd+K / Ctrl+K / /)
         ══════════════════════════════════════════════════════ -->
    <div id="search-modal"
         class="hidden fixed inset-0 z-50 flex items-start justify-center pt-[12vh] px-4"
         role="dialog" aria-modal="true" aria-label="Busca no sistema" aria-hidden="true">

      <!-- Backdrop com blur -->
      <div class="absolute inset-0 bg-deep-shadow/80 backdrop-blur-sm"></div>

      <!-- Painel CRT ──────────────────────────────────────── -->
      <div class="relative w-full max-w-xl overflow-hidden rounded-sm
                  border border-aqua-neon/60 bg-deep-shadow/95
                  shadow-2xl shadow-aqua-neon/10">

        <!-- Overlay de scanlines (efeito monitor CRT) -->
        <div class="scanlines absolute inset-0 z-10 pointer-events-none"></div>

        <!-- Barra de título do modal -->
        <div class="flex items-center justify-between border-b border-rust-copper/40 px-4 py-2">
          <span class="font-code text-xs tracking-widest text-aqua-neon/70">
            // SYSTEM_SEARCH_v1.0
          </span>
          <button id="search-close"
                  aria-label="Fechar busca"
                  class="font-code text-xs text-clay-tan/40 transition-colors hover:text-clay-tan">
            [ESC]
          </button>
        </div>

        <!-- Campo de busca -->
        <div class="flex items-center gap-2 border-b border-rust-copper/30 px-4 py-3">
          <span class="select-none whitespace-nowrap font-code text-xs text-rust-copper">
            // BUSCAR_NO_SISTEMA &gt;
          </span>
          <input id="search-input"
                 type="text"
                 autocomplete="off"
                 spellcheck="false"
                 placeholder="digite sua busca..."
                 class="flex-1 bg-transparent font-code text-sm text-clay-tan
                        placeholder:text-clay-tan/25 outline-none caret-aqua-neon">
        </div>

        <!-- Área de resultados -->
        <div id="search-results" class="max-h-72 overflow-y-auto"></div>

        <!-- Rodapé com hints de teclado -->
        <div class="flex gap-5 border-t border-rust-copper/20 px-4 py-2">
          <span class="font-code text-xs text-clay-tan/30">↵&nbsp;navegar</span>
          <span class="font-code text-xs text-clay-tan/30">esc&nbsp;fechar</span>
          <span class="font-code text-xs text-clay-tan/30">⌘K&nbsp;·&nbsp;/&nbsp;abrir</span>
        </div>

      </div>
    </div>
    <!-- ══ FIM MODAL ══ -->

    <main class="relative z-10 mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
      
<title>404 Not Found</title>
<h1 class="title">
    <h1>404 Not Found</h1>
</h1>

<p>Click <a href="https://gustavogarciapereira.github.io/meu_blog_com_zola/blog/">here</a> Para ler mais.</p>

    </main>

    <!-- Command Palette -->
    <script src="https:&#x2F;&#x2F;gustavogarciapereira.github.io&#x2F;meu_blog_com_zola&#x2F;js/search.js"></script>
  </body>
</html>
